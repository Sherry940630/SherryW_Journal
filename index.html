<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    
    <title>王之諠的回憶錄</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="book">
        <img class="book-bg" src="images/Assets/BookBase.png" alt="book">


        <div class="book-ui">
        <div class="page left" id="leftPage">
        </div>

        <div class="spine">
            <!--書脊-->
        </div>

        <div class="page right" id="rightPage">
        </div>

        <div class="tabs">
            <div class="tab-group">
                <button class="tab main-tab"
                    onclick="loadPage(
                        'home',
                        '#leftPage',
                        '#rightPage'
                    )">
                    主頁
                </button>
            </div>
            
            <div class="tab-group">
                <button class="tab main-tab">Unity專題</button>
                <div class="sub-tabs">
                    <a href="javascript:void(0)"
                        onclick="loadPage
                        (
                            'bell',
                            '#leftPage',
                            '#rightPage'
                        )">
                        Bell(專題)
                    </a>
                    <a href="javascript:void(0)"
                        onclick="loadPage
                        (
                            'minesweeper',
                            '#leftPage',
                            '#rightPage'
                        )">
                        學習過程
                    </a>
                </div>
            </div>

            <div class="tab-group">
                <button class="tab main-tab">C++刷題</button>
                <div class="sub-tabs">
                    <a href="javascript:void(0)"
                        onclick="loadPage
                        (
                            'zerojudge',
                            '#leftPage',
                            '#rightPage'
                        )">
                        ZeroJudge
                    </a>
                    <a href="javascript:void(0)"
                        onclick="loadPage
                        (
                            'leetcode',
                            '#leftPage',
                            '#rightPage'
                        )">
                        LeetCode
                    </a>
                </div>
            </div>

            <div class="tab-group">
                <button class="tab main-tab">網頁</button>
                <div class="sub-tabs">
                    <a href="javascript:void(0)"
                        onclick="loadPage
                        (
                            'portfolio',
                            '#leftPage',
                            '#rightPage'
                        )">
                        現在這個網站
                    </a>
                    <a href="javascript:void(0)"
                        onclick="loadPage
                        (
                            'beauty',
                            '#leftPage',
                            '#rightPage'
                        )">
                        風景裡的小事
                    </a>

                </div>
            </div>

            <div class="tab-group">
                <button class="tab main-tab">大型語言模型</button>
                <div class="sub-tabs">
                    <a href="javascript:void(0)"
                        onclick="loadPage
                        (
                            'llm',
                            '#leftPage',
                            '#rightPage'
                        )">
                        Nico
                    </a>
                </div>

            </div>

            <div class="tab-group">
                <button class="tab main-tab">藝術創作</button>
                <div class="sub-tabs">
                    <a href="javascript:void(0)"
                        onclick="loadPage
                        (
                            'ibispaint',
                            '#leftPage',
                            '#rightPage'
                        )">
                        Ibispaint畫畫
                    </a>
                    <a href="javascript:void(0)"
                        onclick="loadPage
                        (
                            'blender',
                            '#leftPage',
                            '#rightPage'
                        )">
                        Blender建模
                    </a>
                </div>
            </div>

        </div>
    </div>

    
    <!---放大圖片用的-->
    <div id="image-modal">
        <img id="image-modal-img">
    </div>

    <script src="js/main.js" defer></script>

</body>
</html>
